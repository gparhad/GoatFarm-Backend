spring.application.name=GoatFarm

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================================================
# H2 Console (Web UI)
# ===============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================================================
# JPA / Hibernate
# ===============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Run SQL init scripts (data.sql) on startup
spring.sql.init.mode=always

# If you use JPA/Hibernate to create tables, run data.sql after tables are created
spring.jpa.defer-datasource-initialization=true
logging.level.com.goatfarm.aop=INFO


# ===============================================================
# Connection Pool (HikariCP)
# ===============================================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===============================================================
# Logging
# ===============================================================
logging.level.org.springframework.web=INFO
logging.level.com.goatfarm=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================================================
# Server Configuration
# ===============================================================
server.port=8080
logging.level.com.fasterxml.jackson=DEBUG