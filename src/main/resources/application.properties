# ===============================================================
# Application
# ===============================================================
spring.application.name=GoatFarm
server.port=8080

# ===============================================================
# Datasource (H2 In-Memory)
# ===============================================================
spring.datasource.url=jdbc:h2:mem:goatfarmdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===============================================================
# H2 Console
# ===============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================================================
# JPA / Hibernate
# ===============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# Run SQL init scripts (data.sql) on startup
spring.sql.init.mode=always

# ===============================================================
# Logging
# ===============================================================
logging.level.org.springframework.web=INFO
logging.level.com.goatfarm=DEBUG
logging.level.com.goatfarm.aop=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.fasterxml.jackson=DEBUG
